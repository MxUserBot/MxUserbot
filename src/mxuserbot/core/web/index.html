<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title data-i18n="page_title">MXUserbot | Session Init</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0f; 
            color: #ececed;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        #cosmos { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .card { display: none; position: relative; } 
        .card-active { display: block; animation: fadeIn 0.2s ease-out forwards; }
        .card-exit { display: block; animation: fadeOut 0.2s ease-in forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-5px); } }
        
        .lang-container { position: absolute; top: 20px; right: 20px; display: flex; gap: 4px; z-index: 20;}
        .lang-btn { background: #000; border: 1px solid #2d2d35; color: #94949e; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .lang-btn:hover { color: #fff; border-color: #ffb2ef; }
        .lang-btn.active { background: #2d2d35; border-color: #2d2d35; color: #fff; font-weight: 600; }
        
        /* Inputs & Buttons */
        .input-field { background: #000; border: 1px solid #2d2d35; color: #ececed; transition: all 0.3s; }
        .input-field:focus { border-color: #ffb2ef; outline: none; }
        
        .btn-primary { background: #ffb2ef; color: #000; border: none; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-secondary { background: #2d2d35; color: #fff; border: none; transition: all 0.2s;}
        .btn-secondary:hover { background: #3f3f4a; }
        
        .result-card { animation: fadeIn 0.3s ease-out; }
        
        .orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.02); animation: spin 40s linear infinite; pointer-events: none; }
        .orbit-1 { width: 400px; height: 400px; top: 50%; left: 50%; margin: -200px 0 0 -200px; }
        .orbit-2 { width: 600px; height: 600px; top: 50%; left: 50%; margin: -300px 0 0 -300px; animation-duration: 60s; animation-direction: reverse; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .quote-box {
            border-left: 4px solid #ffb2ef;
            padding: 1.25rem 1rem;
            margin-bottom: 1.5rem;
            background: #1a1a1f;
            text-align: left;
            border-top-right-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <canvas id="cosmos"></canvas>
    <div class="orbit orbit-1"></div>
    <div class="orbit orbit-2"></div>

    <div class="w-full max-w-[580px] z-10 relative">
        
        <div id="scr-welcome" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl card-active backdrop-blur-sm">
            <div class="lang-container">
                <button class="lang-btn active" onclick="setLang('en')" data-lang-btn="en">EN</button>
                <button class="lang-btn" onclick="setLang('ru')" data-lang-btn="ru">RU</button>
            </div>
            
            <h1 class="text-3xl font-bold mb-2 tracking-tight text-white mt-4" data-i18n="app_title">MXUserbot</h1>
            <p class="text-[#94949e] text-sm mb-6" data-i18n="welcome_subtitle">Expand the capabilities of your Matrix account.</p>
            
            <div class="quote-box">
                <p class="text-xs leading-relaxed text-[#ececed]" data-i18n="welcome_desc" data-i18n-html="true"></p>
            </div>

            <ul class="space-y-3 mb-8 text-left pl-2">
                <li class="text-[#94949e] flex items-center gap-3">
                    <span class="border-[#2d2d35] pl-3" data-i18n="feature_1"></span>
                </li>
                <li class="text-[#94949e]  flex items-center gap-3">
                    <span class="border-[#2d2d35] pl-3" data-i18n="feature_2"></span>
                </li>
                <li class="text-[#94949e] flex items-center gap-3">
                    <span class=" border-[#2d2d35] pl-3" data-i18n="feature_3"></span>
                </li>
            </ul>

            <button onclick="nav('scr-welcome', 'scr-warning')" class="w-full p-4 btn-primary rounded-lg text-sm transition-all" data-i18n="btn_get_started">Get Started</button>
        </div>

        <div id="scr-warning" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl backdrop-blur-sm">
            <div class="lang-container">
                <button class="lang-btn active" onclick="setLang('en')" data-lang-btn="en">EN</button>
                <button class="lang-btn" onclick="setLang('ru')" data-lang-btn="ru">RU</button>
            </div>

            <h1 class="text-2xl font-bold mb-4 tracking-tight text-[#f87171] mt-4" data-i18n="warning_title"></h1>
            <p class="text-[#94949e] text-sm mb-6" data-i18n="warning_subtitle"></p>
            
            <div class="quote-box" style="border-left-color: #f87171;">
                <p class="text-xs leading-relaxed text-[#94949e]" data-i18n="warning_text"></p>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="nav('scr-warning', 'scr-login')" class="w-full p-3.5 btn-primary rounded-lg text-sm transition-all" data-i18n="btn_accept"></button>
                <button onclick="terminate()" class="w-full p-3.5 btn-secondary rounded-lg text-sm font-semibold transition-all" data-i18n="btn_decline"></button>
            </div>
        </div>

        <form id="scr-login" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl backdrop-blur-sm">
            <div class="lang-container">
                <button class="lang-btn active" onclick="setLang('en')" data-lang-btn="en">EN</button>
                <button class="lang-btn" onclick="setLang('ru')" data-lang-btn="ru">RU</button>
            </div>

            <h1 class="text-2xl font-bold mb-4 tracking-tight text-white mt-4" data-i18n="auth_title"></h1>
            <p class="text-[#94949e] text-sm mb-6" data-i18n="auth_subtitle"></p>
            
            <div class="space-y-5 mb-6 text-left">
                <div>
                    <label class="block text-[11px] font-semibold text-[#94949e] mb-2 uppercase tracking-wider" data-i18n="label_mxid"></label>
                    <input id="mxid" type="text" placeholder="@user:matrix.org" required class="w-full p-3.5 input-field text-white text-sm rounded-lg transition-all">
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-[#94949e] mb-2 uppercase tracking-wider" data-i18n="label_password"></label>
                    <input id="pass" type="password" placeholder="••••••••" required class="w-full p-3.5 input-field text-white text-sm rounded-lg transition-all">
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button type="submit" class="w-full p-3.5 btn-primary rounded-lg text-sm transition-all" data-i18n="btn_signin"></button>
                <button type="button" onclick="nav('scr-login', 'scr-welcome')" class="w-full p-3.5 btn-secondary rounded-lg text-sm font-semibold transition-all" data-i18n="btn_cancel"></button>
            </div>
        </form>

        <div id="scr-loading" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl backdrop-blur-sm">
            <div class="w-10 h-10 border-2 border-white/10 border-t-[#ffb2ef] rounded-full animate-spin mx-auto mb-6 mt-8"></div>
            <h1 class="text-2xl font-bold mb-3 text-white" data-i18n="loading_title"></h1>
            <p class="text-[#94949e] text-sm mb-4" data-i18n="loading_text"></p>
        </div>

        <div id="scr-result" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl result-card backdrop-blur-sm">
            <div class="lang-container">
                <button class="lang-btn active" onclick="setLang('en')" data-lang-btn="en">EN</button>
                <button class="lang-btn" onclick="setLang('ru')" data-lang-btn="ru">RU</button>
            </div>
            
            <h1 id="res-title" class="text-3xl font-bold mb-4 text-white mt-4" data-i18n="result_title"></h1>
            <p id="res-desc" class="text-[#94949e] text-sm mb-6 leading-relaxed"></p>
            <div id="res-actions"></div>
        </div>
    </div>

    <script>
        let translations = {};
        let currentLang = 'en';

        const canvas = document.getElementById('cosmos');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        let stars =[];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.r = Math.random() * 1.6 + 0.4; // Slightly larger stars
                this.speed = Math.random() * 0.1 + 0.04;
                this.alpha = Math.random() * 0.7 + 0.2; // Brighter alpha
                this.color = `rgba(210, 210, 225, ${this.alpha})`; // Silver-white stars
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        for (let i = 0; i < 250; i++) stars.push(new Star());
        
        function animateStars() {
            ctx.fillStyle = '#0b0b0f'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/locale');
                translations = await response.json();
                setLang(currentLang);
            } catch (error) {}
        });

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-lang-btn]').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang-btn') === lang);
            });
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const translation = (translations[lang] && translations[lang][key]) || (translations['en'] && translations['en'][key]);
                if (translation) {
                    if (el.tagName === 'TITLE') {
                        document.title = translation;
                    } else if (el.dataset.i18nHtml === 'true') {
                        el.innerHTML = translation;
                    } else {
                        el.textContent = translation;
                    }
                }
            });
        }

        const nav = (from, to) => {
            const elFrom = document.getElementById(from);
            const elTo = document.getElementById(to);
            elFrom.classList.remove('card-active');
            elFrom.classList.add('card-exit');
            setTimeout(() => {
                elFrom.classList.remove('card-exit');
                elTo.classList.add('card-active');
            }, 200);
        };

        const terminate = () => {
            const t = document.getElementById('res-title'), d = document.getElementById('res-desc'), a = document.getElementById('res-actions');
            t.textContent = translations[currentLang].access_denied;
            t.classList.add('text-[#f87171]');
            d.innerHTML = translations[currentLang].session_terminated;
            a.innerHTML = `<div class="mt-8 pt-5 border-t border-[#2d2d35] flex justify-center gap-5 text-xs">` +
                `<a href="https://matrix.to/#/#SpacePashaHatsune:matrix.org" class="text-[#ffb2ef] hover:text-white hover:underline transition-colors">space</a>` +
                `<a href="https://github.com/MxUserBot/MxUserbot" class="text-[#ffb2ef] hover:text-white hover:underline transition-colors">github</a>` +
                `<a href="https://destream.net/live/Pashahatsune/donate" class="text-[#ffb2ef] hover:text-white hover:underline transition-colors">donate</a>` +
                `</div>`;
            document.body.querySelector('.card-active')?.classList.remove('card-active');
            
            document.body.innerHTML += `
                <div class="w-full max-w-[580px] z-10 relative bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl result-card backdrop-blur-sm">
                    <h1 class="text-3xl font-bold mb-4 text-[#f87171]">${translations[currentLang].access_denied}</h1>
                    <p class="text-[#94949e] text-sm">${d.innerHTML}</p>
                </div>`;
        };

        document.getElementById('scr-login').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('mxid').value.trim();
            const p = document.getElementById('pass').value;
            if(!u.includes(':')) return alert(translations[currentLang].mxid_format_error);
            nav('scr-login', 'scr-loading');
            const start = Date.now();
            let ok = false, msg = "";
            try {
                const r = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({mxid: u, password: p})
                });
                const d = await r.json();
                ok = r.ok; msg = d.detail || "";
            } catch { msg = translations[currentLang].server_unreachable; }
            setTimeout(() => {
                const t = document.getElementById('res-title'), d = document.getElementById('res-desc'), a = document.getElementById('res-actions');
                if(ok) {
                    t.textContent = translations[currentLang].result_success || 'Success';
                    t.classList.add('text-white');
                    d.innerHTML = translations[currentLang].session_initialized || "Session initialized. The userbot is now active.";
                    a.innerHTML = `<button onclick="window.location.href='panel'" class="w-full p-3.5 btn-primary rounded-lg text-sm transition-all">${translations[currentLang].btn_panel || 'Admin Panel'}</button>` +
                        `<div class="mt-8 pt-5 border-t border-[#2d2d35] flex justify-center gap-5 text-xs">` +
                        `<a href="https://matrix.to/#/#SpacePashaHatsune:matrix.org" class="text-[#ffb2ef] hover:text-white hover:underline transition-colors">space</a>` +
                        `<a href="https://github.com/MxUserBot/MxUserbot" class="text-[#ffb2ef] hover:text-white hover:underline transition-colors">github</a>` +
                        `<a href="https://destream.net/live/Pashahatsune/donate" class="text-[#ffb2ef] hover:text-white hover:underline transition-colors">donate</a>` +
                        `</div>`;
                } else {
                    t.textContent = translations[currentLang].result_failed;
                    t.classList.add('text-[#f87171]');
                    d.innerHTML = msg || translations[currentLang].result_failed;
                    a.innerHTML = `<button onclick="nav('scr-result', 'scr-login')" class="w-full p-3.5 btn-secondary rounded-lg text-sm font-semibold transition-all" data-i18n="btn_try_again">${translations[currentLang].btn_try_again}</button>`;
                }
                nav('scr-loading', 'scr-result');
            }, Math.max(0, 1500 - (Date.now() - start)));
        };
    </script>
</body>
</html>
